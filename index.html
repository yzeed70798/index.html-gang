<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { background-color: #050a14; color: white; font-family: 'Segoe UI', sans-serif; padding: 20px; }
        .card { background-color: #0b1528; border: 1px solid #1a3a60; padding: 25px; border-radius: 15px; margin-bottom: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        h2 { color: #00ff41; border-bottom: 2px solid #1a3a60; padding-bottom: 10px; }
        .phone-form-input { width: 100%; background-color: #050a14; border: 1px solid #1a3a60; padding: 15px; border-radius: 8px; color: white; margin-bottom: 15px; font-size: 1.1rem; box-sizing: border-box; }
        .red-text { color: #ff3333; font-weight: bold; font-size: 1.4rem; }
        .green-text { color: #00ff41; font-weight: bold; font-size: 1.2rem; }
        button { width: 100%; padding: 25px; background-color: #00ff41; color: #050a14; border: none; border-radius: 12px; font-size: 1.6rem; font-weight: bold; cursor: pointer; transition: 0.3s; }
        button:hover { background-color: #00cc33; }
    </style>
</head>
<body>

    <div class="card">
        <h2>🌐 الدارك ويب</h2>
        <input type="text" id="item" class="phone-form-input" placeholder="ادخل السلعة التي تريد بيعها...">
        <input type="number" id="price" class="phone-form-input" placeholder="السعر المطلوب...">
        <button onclick="alert('تم عرض السلعة في الدارك ويب')">بيع السلعة</button>
    </div>

    <div class="card">
        <h2>🚨 العساكر المطلوبون (10)</h2>
        <p class="red-text">نواف العتيبي (وزير): 50M</p>
        <p class="red-text">يزيد عسيري (نائب): 40M</p>
        <p class="red-text">بقية العساكر: 10M</p>
    </div>

    <div class="card">
        <h2>👑 القيادات</h2>
        <p>قانق مانيجر: <span class="green-text">أبو مبارك</span></p>
        <p>بقية القيادات: <span style="color:red">لا يوجد</span></p>
    </div>

    <div class="card">
        <h2>💓 تطبيق جس النبض</h2>
        <input type="text" id="criminalName" class="phone-form-input" placeholder="اسم المجرم الجديد...">
        <input type="text" id="criminalRank" class="phone-form-input" placeholder="المنصب...">
        <button onclick="sendToDiscord()">إرسال للديسكورد</button>
    </div>

    <script>
        function sendToDiscord() {
            const name = document.getElementById('criminalName').value;
            const rank = document.getElementById('criminalRank').value;
            const webhookUrl = "ضع_رابط_الويب_هوك_هنا"; // ضع رابطك هنا
            
            fetch(webhookUrl, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ 
                    content: "🚨 **تم رصد مجرم جديد في دولة SM**\n**الاسم:** " + name + "\n**المنصب:** " + rank 
                })
            }).then(() => alert('تم إرسال البيانات إلى الديسكورد'));
        }
    </script>
</body>
</html>
